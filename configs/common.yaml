seed: 3407
model_name: unet_lstm
batch_size: 16
epochs: 60
learning_rate: 0.0003
use_cosine_annealing: true
cosine_t_max: 10
cosine_eta_min: 0.0001
input_steps: 96
output_steps: 96
num_features: 21
use_standardized_data: false
use_multiscale_u: true
unet_channels:
  - 16
  - 32
  - 64
lstm_hidden_size: 64
lstm_layers: 3
use_bidirectional_skip_lstm: true
skip_temporal_mode: lstm
skip_tcn_layers: 2
skip_tcn_kernel_size: 3
skip_tcn_dropout: 0.2
use_residual_output: true
baseline_model_type: lstm
baseline_lstm_hidden_size: 64
baseline_tcn_channels: [32, 32, 32]
baseline_tcn_kernel_size: 3
baseline_tcn_dropout: 0.2
dropout: 0.2
train_augmentation: true
amplitude_jitter_prob: 0.5
amplitude_jitter_min: 0.95
amplitude_jitter_max: 1.05
input_noise_std: 0.02
train_time_slice_stride: 96
time_mask_prob: 0.2
time_mask_min_width: 4
time_mask_max_width: 8
mixup_prob: 0.3
mixup_alpha: 0.2
loss_rmse_weight: 1
loss_mape_weight: 0
loss_mape_epsilon: 0.001
best_model_dir: outputs/checkpoints
